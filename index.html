<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caliper — NHL Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <link rel="icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-hexbin@0.2.2/build/d3-hexbin.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1a1a1a;
      --border-mid: #252525;
      --text: #e8e8e8;
      --text-sec: #5a5a5a;
      --text-mid: #999;
      --accent: #4ade80;
      --accent-dim: rgba(74,222,128,0.1);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.1);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --ease: cubic-bezier(0.16,1,0.3,1);
    }

    html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Header ─────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,8,8,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .logo {
      font-family: var(--sans);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.04em;
    }
    .logo em { font-style: normal; font-weight: 100; color: #4a4a4a; }

    .nav-tabs {
      display: flex;
      gap: 4px;
      background: var(--border);
      padding: 3px;
      border-radius: 8px;
    }
    .nav-tab {
      padding: 6px 18px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-mid);
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { background: var(--surface); color: var(--text); }

    /* ── Main layout ─────────────────────────────── */
    main { max-width: 1280px; margin: 0 auto; padding: 32px 32px 80px; }

    .tab-section { display: none; }
    .tab-section.active { display: block; }

    /* ── Filter bar ──────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      position: sticky;
      top: 56px;
      z-index: 40;
      background: var(--bg);
      padding: 12px 0;
      margin-top: -12px;
    }

    .filter-bar input[type="text"],
    .filter-bar select {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-family: var(--sans);
      outline: none;
      transition: border 0.15s;
    }
    .filter-bar input[type="text"]:focus,
    .filter-bar select:focus { border-color: var(--accent); }
    .filter-bar input[type="text"] { width: 200px; }
    .filter-bar select { min-width: 110px; }

    .filter-spacer { flex: 1; }

    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      border: 1px solid var(--border-mid);
      transition: background 0.15s, border 0.15s, color 0.15s;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-mid);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-mid); }
    .btn-ghost.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #22c55e; border-color: #22c55e; }
    .btn-primary:disabled {
      background: var(--border-mid);
      border-color: var(--border-mid);
      color: var(--text-sec);
      cursor: not-allowed;
    }

    /* ── Section headings ────────────────────────── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 400;
    }
    .section-sub {
      font-size: 0.78rem;
      color: var(--text-sec);
    }

    /* ── Data table ──────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 260px);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-sec);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: color 0.15s;
    }
    thead th:hover { color: var(--text-mid); }
    thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }
    tbody tr.selected td { background: rgba(74,222,128,0.04); }

    td {
      padding: 10px 14px;
      white-space: nowrap;
      color: var(--text-mid);
    }
    td.name-cell { color: var(--text); font-weight: 500; }
    td.stat-hi { color: var(--accent); }
    td.stat-lo { color: var(--text-mid); }

    .chk-cell { width: 28px; padding-left: 14px; }
    .chk-cell input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px; height: 14px;
      cursor: pointer;
    }

    .team-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border-mid);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-mid);
    }
    .team-badge.tor { background: rgba(0,63,160,0.3); color: #4488ff; }

    .leafs-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--accent);
      padding: 2px 6px;
      background: var(--accent-dim);
      border-radius: 4px;
    }

    /* ── Sticky table headers ────────────────────── */
    #players-table thead th {
      position: sticky;
      top: 114px; /* 56px nav + ~58px filter bar */
      z-index: 20;
      background: var(--surface);
    }
    #teams-table thead th {
      position: sticky;
      top: 56px;
      z-index: 20;
      background: var(--surface);
    }

    /* ── Player detail inline row ─────────────────── */
    .detail-expanded-row td { padding: 0 !important; border-bottom: 1px solid var(--border-mid); }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-inline {
      background: var(--surface);
      animation: fadeSlide 0.18s var(--ease);
    }

    .pd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .pd-name {
      font-family: var(--serif);
      font-size: 1.2rem;
    }
    .pd-meta { font-size: 0.78rem; color: var(--text-mid); margin-top: 2px; }
    .pd-close {
      background: none;
      border: none;
      color: var(--text-sec);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .pd-close:hover { color: var(--text); background: var(--border-mid); }

    .pd-body {
      display: flex;
      gap: 0;
      min-height: 280px;
    }
    .pd-col {
      flex: 1;
      padding: 20px;
    }
    .pd-col + .pd-col {
      border-left: 1px solid var(--border);
    }
    .pd-col-title {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-sec);
      margin-bottom: 12px;
    }

    /* ── Compare panel ───────────────────────────── */
    .compare-panel {
      display: none;
      margin: 20px 0;
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
      animation: fadeSlide 0.2s var(--ease);
    }
    .compare-panel.open { display: block; }

    .cp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .cp-title { font-family: var(--serif); font-size: 1.1rem; }
    .cp-close {
      background: none; border: none;
      color: var(--text-sec); font-size: 1.2rem;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
    }
    .cp-close:hover { color: var(--text); background: var(--border-mid); }

    .cp-body { display: flex; align-items: flex-start; }
    .cp-chart { flex: 0 0 360px; padding: 16px; }
    .cp-stats { flex: 1; padding: 16px; overflow-x: auto; }

    /* ── Heatmap SVG ─────────────────────────────── */
    .heatmap-wrap { position: relative; }
    .heatmap-wrap svg { display: block; margin: 0 auto; }

    .ice-surface { fill: #0a1a0f; }
    .ice-line { fill: none; stroke: #1e4d2b; stroke-width: 1; }
    .ice-crease { fill: rgba(74,222,128,0.08); stroke: #1e4d2b; stroke-width: 1; }
    .goal-line-svg { stroke: var(--red); stroke-width: 1.5; fill: none; }
    .net-rect { fill: none; stroke: var(--red); stroke-width: 1.5; }

    /* ── Trends chart ────────────────────────────── */
    .trends-wrap svg { display: block; width: 100%; }
    .trend-line { fill: none; stroke-width: 2; }
    .trend-dot { cursor: pointer; }
    .axis text { fill: var(--text-sec); font-size: 10px; font-family: var(--sans); }
    .axis line, .axis path { stroke: var(--border-mid); }
    .grid line { stroke: var(--border); stroke-dasharray: 2,4; }

    /* ── Radar chart ─────────────────────────────── */
    .radar-axis-label { fill: var(--text-mid); font-size: 10px; font-family: var(--sans); }
    .radar-grid { fill: none; stroke: var(--border-mid); }
    .radar-shape { fill-opacity: 0.12; stroke-width: 2; }

    /* ── Compare stats table ─────────────────────── */
    .cmp-table { border-collapse: collapse; width: 100%; font-size: 0.8rem; }
    .cmp-table th {
      padding: 6px 12px;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-sec);
      font-weight: 500;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .cmp-table td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-mid);
      white-space: nowrap;
    }
    .cmp-table td.best { color: var(--accent); font-weight: 600; }
    .cmp-table tr:last-child td { border-bottom: none; }

    /* ── Team season picker ──────────────────────── */
    .team-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    /* ── Loading / empty states ──────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-sec);
      font-size: 0.85rem;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sec);
      font-size: 0.85rem;
    }

    /* ── Compare count badge ─────────────────────── */
    .compare-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 6px;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 800px) {
      header { padding: 0 16px; }
      main { padding: 20px 16px 60px; }
      .pd-body { flex-direction: column; }
      .pd-col + .pd-col { border-left: none; border-top: 1px solid var(--border); }
      .cp-body { flex-direction: column; }
      .cp-chart { flex: none; width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Cal<em>iper</em></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="players">Players</button>
    <button class="nav-tab" data-tab="teams">Teams</button>
  </div>
</header>

<main>

  <!-- ══════════════ PLAYERS TAB ══════════════ -->
  <section id="tab-players" class="tab-section active">

    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" id="p-search" placeholder="Search player…" />
      <select id="p-season">
        <option value="">All seasons</option>
      </select>
      <select id="p-pos">
        <option value="">All positions</option>
        <option value="C">C</option>
        <option value="L">LW</option>
        <option value="R">RW</option>
        <option value="D">D</option>
      </select>
      <select id="p-mingp">
        <option value="0">Min GP</option>
        <option value="10">10+</option>
        <option value="20" selected>20+</option>
        <option value="40">40+</option>
        <option value="60">60+</option>
      </select>
      <button class="btn btn-ghost" id="p-leafs-btn">🍁 Leafs only</button>
      <div class="filter-spacer"></div>
      <button class="btn btn-primary" id="p-compare-btn" disabled>Compare <span id="compare-count-badge"></span></button>
    </div>

    <!-- Compare panel (hidden until 2+ checked) -->
    <div class="compare-panel" id="compare-panel">
      <div class="cp-header">
        <div class="cp-title">Player Comparison</div>
        <button class="cp-close" id="cp-close">✕</button>
      </div>
      <div class="cp-body">
        <div class="cp-chart" id="radar-wrap"></div>
        <div class="cp-stats" id="cmp-stats-wrap"></div>
      </div>
    </div>

    <!-- Players table -->
    <div class="section-header">
      <div class="section-title">Players</div>
      <div class="section-sub" id="p-count"></div>
    </div>
    <div class="table-wrap">
      <table id="players-table">
        <thead>
          <tr>
            <th class="chk-cell"></th>
            <th data-col="name">Player</th>
            <th data-col="team">Team</th>
            <th data-col="season">Season</th>
            <th data-col="position">Pos</th>
            <th data-col="games_played">GP</th>
            <th data-col="goals">G</th>
            <th data-col="assists">A</th>
            <th data-col="points" class="sort-desc">PTS</th>
            <th data-col="plus_minus">+/-</th>
            <th data-col="shots_on_goal">SOG</th>
            <th data-col="shooting_pct">S%</th>
            <th data-col="icetime_min_per_game">TOI/G</th>
            <th data-col="corsi_pct">CF%</th>
            <th data-col="xgf_pct">xG%</th>
          </tr>
        </thead>
        <tbody id="players-tbody"></tbody>
      </table>
    </div>
    <div id="players-loading" class="loading"><div class="spinner"></div>Loading player data…</div>
  </section>

  <!-- ══════════════ TEAMS TAB ══════════════ -->
  <section id="tab-teams" class="tab-section">
    <div class="team-controls">
      <select id="t-season">
        <option value="">All seasons</option>
      </select>
    </div>
    <div class="section-header">
      <div class="section-title">Teams</div>
      <div class="section-sub" id="t-count"></div>
    </div>
    <div class="table-wrap">
      <table id="teams-table">
        <thead>
          <tr>
            <th data-col="team">Team</th>
            <th data-col="season">Season</th>
            <th data-col="games_played">GP</th>
            <th data-col="team_goals" class="sort-desc">GF</th>
            <th data-col="team_goals_against">GA</th>
            <th data-col="team_wins">W</th>
            <th data-col="team_losses">L</th>
            <th data-col="team_otlosses">OTL</th>
            <th data-col="team_points">PTS</th>
            <th data-col="team_shots">SF</th>
            <th data-col="team_shots_against">SA</th>
            <th data-col="team_cf_pct">CF%</th>
            <th data-col="team_xg_pct">xG%</th>
          </tr>
        </thead>
        <tbody id="teams-tbody"></tbody>
      </table>
    </div>
    <div id="teams-loading" class="loading"><div class="spinner"></div>Loading team data…</div>
  </section>

</main>

<script>
/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let playerStats = [];
let teamStats = [];
let heatmapData = null;
let heatmapLoading = false;

let pSort = { col: 'points', dir: 'desc' };
let tSort = { col: 'team_goals', dir: 'desc' };

let leafsFilter = false;
let selectedPlayer = null;  // { name, season }
let compareList = [];       // max 3: [{name, season, row}]

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
function fmtSeason(s) {
  const n = parseInt(String(s));
  if (String(s).length === 4) return `${n}-${String(n + 1).slice(2)}`;
  const y = Math.floor(n / 10000);
  return `${y}-${String(y + 1).slice(2)}`;
}

function fmtNum(v, dec = 0) {
  if (v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return n.toFixed(dec);
}

function fmtShotPct(v) {
  // shooting_pct is already a percentage value like 15.8, not 0.158
  if (v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return n.toFixed(1) + '%';
}

function fmtPlusMinus(v) {
  if (v === null || v === undefined || v === '') return '—';
  const n = parseInt(v);
  if (isNaN(n)) return '—';
  return n > 0 ? `+${n}` : String(n);
}

function fmtTOI(v) {
  // icetime_min_per_game is decimal minutes, e.g. 23.05 = 23:03
  if (!v) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  const m = Math.floor(n);
  const s = Math.round((n - m) * 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function num(v) { return parseFloat(v) || 0; }

/* ════════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

/* ════════════════════════════════════════════════
   LOAD DATA
════════════════════════════════════════════════ */
async function loadAll() {
  const [ps, ts] = await Promise.all([
    fetch('data/player_season_stats.json').then(r => r.json()).catch(() => []),
    fetch('data/team_season_stats.json').then(r => r.json()).catch(() => [])
  ]);
  playerStats = ps;
  teamStats = ts;

  buildSeasonSelects();
  renderPlayers();
  renderTeams();

  document.getElementById('players-loading').style.display = 'none';
  document.getElementById('teams-loading').style.display = 'none';
}

function buildSeasonSelects() {
  const pSeasons = [...new Set(playerStats.map(r => r.season))].sort((a,b) => b-a);
  const tSeasons = [...new Set(teamStats.map(r => r.season))].sort((a,b) => b-a);

  const pSel = document.getElementById('p-season');
  const tSel = document.getElementById('t-season');

  pSeasons.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = fmtSeason(s);
    pSel.appendChild(o);
  });
  if (pSeasons.length) pSel.value = pSeasons[0];

  tSeasons.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = fmtSeason(s);
    tSel.appendChild(o);
  });
  if (tSeasons.length) tSel.value = tSeasons[0];
}

/* ════════════════════════════════════════════════
   PLAYER TABLE
════════════════════════════════════════════════ */
function getFilteredPlayers() {
  const q = document.getElementById('p-search').value.toLowerCase().trim();
  const season = document.getElementById('p-season').value;
  const pos = document.getElementById('p-pos').value;
  const minGP = parseInt(document.getElementById('p-mingp').value) || 0;

  return playerStats.filter(r => {
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (season && String(r.season) !== String(season)) return false;
    if (pos && r.position !== pos) return false;
    if (minGP && num(r.games_played) < minGP) return false;
    if (leafsFilter && r.team !== 'TOR') return false;
    return true;
  });
}

function sortRows(rows, col, dir) {
  return [...rows].sort((a, b) => {
    let av = a[col], bv = b[col];
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) {
      av = an; bv = bn;
    } else {
      av = String(av || '').toLowerCase();
      bv = String(bv || '').toLowerCase();
    }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function renderPlayers() {
  const rows = sortRows(getFilteredPlayers(), pSort.col, pSort.dir);
  document.getElementById('p-count').textContent = `${rows.length.toLocaleString()} players`;

  const tbody = document.getElementById('players-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="15" class="empty-state">No players match your filters.</td></tr>`;
    return;
  }

  const ptMax = Math.max(...rows.map(r => num(r.points)));

  tbody.innerHTML = rows.map(r => {
    const isSelected = selectedPlayer && selectedPlayer.name === r.name && String(selectedPlayer.season) === String(r.season);
    const inCompare = compareList.some(c => c.name === r.name && String(c.season) === String(r.season));
    const assists = num(r.primary_assists) + num(r.secondary_assists);
    const ptClass = num(r.points) >= ptMax * 0.9 ? 'stat-hi' : '';
    const teamBadge = r.team === 'TOR' ? `<span class="team-badge tor">${r.team}</span>` : `<span class="team-badge">${r.team || '—'}</span>`;
    return `<tr class="player-row${isSelected ? ' selected' : ''}" data-name="${encodeURIComponent(r.name)}" data-season="${r.season}">
      <td class="chk-cell"><input type="checkbox" class="compare-chk" ${inCompare ? 'checked' : ''} /></td>
      <td class="name-cell">${r.name}</td>
      <td>${teamBadge}</td>
      <td>${fmtSeason(r.season)}</td>
      <td>${r.position || '—'}</td>
      <td>${fmtNum(r.games_played)}</td>
      <td>${fmtNum(r.goals)}</td>
      <td>${assists || '—'}</td>
      <td class="${ptClass}">${fmtNum(r.points)}</td>
      <td>—</td>
      <td>${fmtNum(r.shots_on_goal)}</td>
      <td>${fmtShotPct(r.shooting_pct)}</td>
      <td>${fmtTOI(r.icetime_min_per_game)}</td>
      <td>${fmtNum(r.corsi_pct, 1)}</td>
      <td>${fmtNum(r.xgf_pct, 1)}</td>
    </tr>`;
  }).join('');

  bindPlayerRows();
  updateSortHeaders('players-table', pSort);
}

function bindPlayerRows() {
  document.querySelectorAll('#players-tbody .player-row').forEach(row => {
    // Row click → expand detail
    row.addEventListener('click', e => {
      if (e.target.type === 'checkbox') return;
      const name = decodeURIComponent(row.dataset.name);
      const season = row.dataset.season;
      if (selectedPlayer && selectedPlayer.name === name && String(selectedPlayer.season) === String(season)) {
        closeDetail();
      } else {
        openDetail(name, season);
      }
    });

    // Checkbox → compare
    const chk = row.querySelector('.compare-chk');
    chk.addEventListener('change', e => {
      e.stopPropagation();
      const name = decodeURIComponent(row.dataset.name);
      const season = row.dataset.season;
      const rowData = playerStats.find(r => r.name === name && String(r.season) === String(season));
      if (chk.checked) {
        if (compareList.length < 3) {
          compareList.push({ name, season, row: rowData });
        } else {
          chk.checked = false;
        }
      } else {
        compareList = compareList.filter(c => !(c.name === name && String(c.season) === String(season)));
      }
      updateCompareUI();
    });
  });
}

function updateSortHeaders(tableId, sortState) {
  document.querySelectorAll(`#${tableId} thead th`).forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortState.col) {
      th.classList.add(sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

// Sort header clicks
document.querySelectorAll('#players-table thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (pSort.col === col) {
      pSort.dir = pSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      pSort.col = col;
      pSort.dir = col === 'name' || col === 'team' || col === 'position' ? 'asc' : 'desc';
    }
    renderPlayers();
  });
});

// Filter listeners
['p-search','p-season','p-pos','p-mingp'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderPlayers);
  document.getElementById(id).addEventListener('change', renderPlayers);
});

document.getElementById('p-leafs-btn').addEventListener('click', () => {
  leafsFilter = !leafsFilter;
  document.getElementById('p-leafs-btn').classList.toggle('active', leafsFilter);
  renderPlayers();
});

/* ════════════════════════════════════════════════
   COMPARE
════════════════════════════════════════════════ */
function updateCompareUI() {
  const btn = document.getElementById('p-compare-btn');
  const badge = document.getElementById('compare-count-badge');
  const n = compareList.length;
  btn.disabled = n < 2;
  badge.textContent = n > 0 ? n : '';
  badge.className = n > 0 ? 'compare-count' : '';
  // Re-render to sync checkboxes
  renderPlayers();
}

document.getElementById('p-compare-btn').addEventListener('click', () => {
  if (compareList.length >= 2) {
    renderCompare();
    document.getElementById('compare-panel').classList.add('open');
    document.getElementById('compare-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});

document.getElementById('cp-close').addEventListener('click', () => {
  document.getElementById('compare-panel').classList.remove('open');
  compareList = [];
  updateCompareUI();
});

function rowAssists(row) {
  return num(row?.primary_assists) + num(row?.secondary_assists);
}

function renderCompare() {
  // Pre-compute assists_total on each compare row
  compareList.forEach(c => { if (c.row) c.row._assists = rowAssists(c.row); });

  const AXES = [
    { key: 'goals',                  label: 'Goals',   scale: 60 },
    { key: '_assists',               label: 'Assists', scale: 80 },
    { key: 'shots_on_goal',          label: 'Shots',   scale: 300 },
    { key: 'corsi_pct',              label: 'CF%',     scale: 65 },
    { key: 'xgf_pct',               label: 'xG%',     scale: 65 },
    { key: 'icetime_min_per_game',   label: 'TOI/G',   scale: 25 },
  ];
  const COLORS = ['#4ade80','#60a5fa','#f97316'];

  drawRadar('radar-wrap', compareList, AXES, COLORS);

  // Stats table
  const statKeys = [
    { key:'games_played',          label:'GP',    fmt: v=>fmtNum(v) },
    { key:'goals',                 label:'G',     fmt: v=>fmtNum(v) },
    { key:'_assists',              label:'A',     fmt: v=>fmtNum(v) },
    { key:'points',                label:'PTS',   fmt: v=>fmtNum(v) },
    { key:'shots_on_goal',         label:'SOG',   fmt: v=>fmtNum(v) },
    { key:'shooting_pct',          label:'S%',    fmt: v=>fmtShotPct(v) },
    { key:'corsi_pct',             label:'CF%',   fmt: v=>fmtNum(v,1) },
    { key:'xgf_pct',              label:'xG%',   fmt: v=>fmtNum(v,1) },
    { key:'icetime_min_per_game',  label:'TOI/G', fmt: v=>fmtTOI(v) },
    { key:'goals_per_60',          label:'G/60',  fmt: v=>fmtNum(v,2) },
    { key:'points_per_60',         label:'P/60',  fmt: v=>fmtNum(v,2) },
  ];

  let html = `<table class="cmp-table"><thead><tr>
    <th>Stat</th>
    ${compareList.map((c,i) => `<th style="color:${COLORS[i]}">${c.name}<br/><span style="font-size:0.65rem;color:var(--text-sec)">${fmtSeason(c.season)}</span></th>`).join('')}
  </tr></thead><tbody>`;

  statKeys.forEach(({ key, label, fmt }) => {
    const vals = compareList.map(c => parseFloat(c.row?.[key]) || 0);
    const maxVal = Math.max(...vals);
    const cells = compareList.map((c,i) => {
      const formatted = fmt(c.row?.[key]);
      const isBest = vals[i] === maxVal && maxVal > 0;
      return `<td class="${isBest ? 'best' : ''}">${formatted}</td>`;
    });
    html += `<tr><td style="color:var(--text-sec)">${label}</td>${cells.join('')}</tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('cmp-stats-wrap').innerHTML = html;
}

function drawRadar(containerId, players, axes, colors) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  const W = 320, H = 280, cx = W/2, cy = H/2 + 10, r = 100;
  const n = axes.length;
  const angles = axes.map((_, i) => (Math.PI * 2 * i / n) - Math.PI / 2);

  const svg = d3.select(wrap).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', W).attr('height', H);

  const g = svg.append('g');

  // Grid rings
  [0.25,0.5,0.75,1].forEach(t => {
    const pts = angles.map(a => [cx + r*t*Math.cos(a), cy + r*t*Math.sin(a)]);
    g.append('polygon')
      .attr('points', pts.map(p=>p.join(',')).join(' '))
      .attr('class','radar-grid');
  });

  // Axes lines
  angles.forEach((a, i) => {
    g.append('line')
      .attr('x1',cx).attr('y1',cy)
      .attr('x2', cx + r*Math.cos(a))
      .attr('y2', cy + r*Math.sin(a))
      .attr('stroke','var(--border-mid)');

    const lx = cx + (r + 18)*Math.cos(a);
    const ly = cy + (r + 18)*Math.sin(a);
    g.append('text')
      .attr('x', lx).attr('y', ly)
      .attr('text-anchor','middle')
      .attr('dominant-baseline','middle')
      .attr('class','radar-axis-label')
      .text(axes[i].label);
  });

  // Player shapes
  players.forEach((p, pi) => {
    const pts = axes.map((ax, i) => {
      const raw = parseFloat(p.row?.[ax.key]) || 0;
      const t = Math.min(raw / ax.scale, 1);
      return [cx + r*t*Math.cos(angles[i]), cy + r*t*Math.sin(angles[i])];
    });
    g.append('polygon')
      .attr('points', pts.map(pt=>pt.join(',')).join(' '))
      .attr('class','radar-shape')
      .attr('fill', colors[pi])
      .attr('stroke', colors[pi]);
    // Dots
    pts.forEach(pt => {
      g.append('circle')
        .attr('cx',pt[0]).attr('cy',pt[1]).attr('r',3)
        .attr('fill',colors[pi]);
    });
  });
}

/* ════════════════════════════════════════════════
   PLAYER DETAIL PANEL
════════════════════════════════════════════════ */
function openDetail(name, season) {
  selectedPlayer = { name, season };
  document.getElementById('pd-player-name').textContent = name;
  const row = playerStats.find(r => r.name === name && String(r.season) === String(season));
  const assists = row ? num(row.primary_assists) + num(row.secondary_assists) : 0;
  document.getElementById('pd-player-meta').textContent =
    row ? `${fmtSeason(season)} · ${row.team} · ${row.position} · ${fmtNum(row.games_played)} GP · ${fmtNum(row.goals)}G ${assists}A ${fmtNum(row.points)}PTS` : fmtSeason(season);

  document.getElementById('player-detail').classList.add('open');

  renderDetailHeatmap(name, season);
  renderDetailTrends(name);
  renderPlayers(); // refresh selected highlight
}

function closeDetail() {
  selectedPlayer = null;
  document.getElementById('player-detail').classList.remove('open');
  renderPlayers();
}

document.getElementById('pd-close').addEventListener('click', closeDetail);

/* ════════════════════════════════════════════════
   HEATMAP
════════════════════════════════════════════════ */
async function loadHeatmapData() {
  if (heatmapData) return heatmapData;
  if (heatmapLoading) return null;
  heatmapLoading = true;
  try {
    heatmapData = await fetch('data/shots_heatmap.json').then(r => r.json());
  } catch(e) {
    heatmapData = {};
  }
  heatmapLoading = false;
  return heatmapData;
}

async function renderDetailHeatmap(name, season) {
  const wrap = document.getElementById('pd-heatmap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>Loading shots…</div>';

  const data = await loadHeatmapData();
  wrap.innerHTML = '';

  const playerShots = data?.[name];
  if (!playerShots) {
    wrap.innerHTML = '<div class="empty-state">No shot data available.</div>';
    return;
  }

  // Get shots for this season or all if season not found
  const seasonKey = String(season);
  let shots = playerShots[seasonKey];
  if (!shots || shots.length === 0) {
    // Try other seasons
    const allShots = Object.values(playerShots).flat();
    if (allShots.length === 0) {
      wrap.innerHTML = '<div class="empty-state">No shot data for this season.</div>';
      return;
    }
    shots = allShots;
  }

  drawHeatmap(wrap, shots);
}

function drawHeatmap(container, shots) {
  // MoneyPuck coords: x=0 center ice, x=89 goal line, y=0 center, y=±42.5 boards
  // We show offensive half: x 0→100, y -42.5→42.5
  // Scale to pixels: rink half = 100ft wide, 85ft tall
  const W = 300, H = 260;
  const PAD = { t:10, r:10, b:10, l:10 };
  const pw = W - PAD.l - PAD.r;
  const ph = H - PAD.t - PAD.b;

  // x: 25 (blue line) → 100 (behind net); y: -42.5 → 42.5
  const xDom = [25, 100], yDom = [-42.5, 42.5];
  const xs = d3.scaleLinear().domain(xDom).range([0, pw]);
  const ys = d3.scaleLinear().domain(yDom).range([ph, 0]);

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', W).attr('height', H);

  const g = svg.append('g').attr('transform', `translate(${PAD.l},${PAD.t})`);

  // Ice background
  g.append('rect').attr('width', pw).attr('height', ph).attr('class','ice-surface').attr('rx',4);

  // Rink lines
  // Blue line at x=25
  g.append('line')
    .attr('x1',xs(25)).attr('y1',0)
    .attr('x2',xs(25)).attr('y2',ph)
    .attr('stroke','#2a5fc0').attr('stroke-width',3).attr('stroke-opacity',0.7);

  // Goal line at x=89
  g.append('line')
    .attr('x1',xs(89)).attr('y1',0)
    .attr('x2',xs(89)).attr('y2',ph)
    .attr('class','goal-line-svg');

  // Crease at x=89, y 0±4 ft radius = semicircle
  const creaseR = xs(89+6) - xs(89);
  g.append('path')
    .attr('d', `M${xs(89)},${ys(4)} A${creaseR},${creaseR} 0 0,1 ${xs(89)},${ys(-4)}`)
    .attr('fill','rgba(74,222,128,0.1)').attr('stroke','#1e4d2b').attr('stroke-width',1);

  // Net
  const netH = ys(-3) - ys(3);
  g.append('rect')
    .attr('x', xs(89)).attr('y', ys(3))
    .attr('width', xs(89+2) - xs(89)).attr('height', Math.abs(netH))
    .attr('class','net-rect');

  // Faceoff circles
  [[69, 22],[69, -22]].forEach(([fx, fy]) => {
    if (fx < xDom[0] || fx > xDom[1]) return;
    const cr = xs(69+9) - xs(69);
    g.append('circle')
      .attr('cx', xs(fx)).attr('cy', ys(fy)).attr('r', Math.abs(cr))
      .attr('fill','none').attr('stroke','#1e4d2b').attr('stroke-width',1);
    g.append('circle')
      .attr('cx', xs(fx)).attr('cy', ys(fy)).attr('r', 2)
      .attr('fill','#1e4d2b');
  });

  // Hexbin
  const hexRadius = 6;
  const hexbin = d3.hexbin()
    .x(d => xs(d[0]))
    .y(d => ys(d[1]))
    .radius(hexRadius)
    .extent([[0,0],[pw,ph]]);

  const bins = hexbin(shots);
  const maxCount = d3.max(bins, b => b.length) || 1;
  const color = d3.scaleSequential()
    .domain([0, maxCount * 0.7])
    .interpolator(d3.interpolateYlOrRd);

  g.append('g').selectAll('path')
    .data(bins)
    .join('path')
    .attr('d', hexbin.hexagon())
    .attr('transform', b => `translate(${b.x},${b.y})`)
    .attr('fill', b => color(b.length))
    .attr('fill-opacity', 0.8)
    .attr('stroke', 'none');

  // Goal dots
  shots.filter(s => s[3] === 1).forEach(s => {
    g.append('circle')
      .attr('cx', xs(s[0])).attr('cy', ys(s[1])).attr('r', 3)
      .attr('fill', '#fff').attr('fill-opacity', 0.9).attr('stroke','none');
  });

  // Legend
  const legW = 80, legH = 8;
  const legG = svg.append('g').attr('transform', `translate(${PAD.l},${H - 16})`);
  const defs = svg.append('defs');
  const grad = defs.append('linearGradient').attr('id','hm-grad');
  grad.append('stop').attr('offset','0%').attr('stop-color', color(0)).attr('stop-opacity', 0.8);
  grad.append('stop').attr('offset','100%').attr('stop-color', color(maxCount * 0.7)).attr('stop-opacity', 0.8);
  legG.append('rect').attr('width', legW).attr('height', legH).attr('fill','url(#hm-grad)').attr('rx',2);
  legG.append('text').attr('x',0).attr('y',-3).attr('fill','var(--text-sec)').attr('font-size',9).text('Low');
  legG.append('text').attr('x',legW).attr('y',-3).attr('fill','var(--text-sec)').attr('font-size',9).attr('text-anchor','end').text('High');
}

/* ════════════════════════════════════════════════
   TRENDS CHART
════════════════════════════════════════════════ */
function renderDetailTrends(name) {
  const wrap = document.getElementById('pd-trends');
  wrap.innerHTML = '';

  const career = playerStats
    .filter(r => r.name === name)
    .sort((a,b) => a.season - b.season);

  if (career.length < 2) {
    wrap.innerHTML = '<div class="empty-state">Not enough seasons for trend chart.</div>';
    return;
  }

  const W = 360, H = 220;
  const margin = { t:16, r:24, b:30, l:36 };
  const iw = W - margin.l - margin.r;
  const ih = H - margin.t - margin.b;

  const svg = d3.select(wrap).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', '100%');

  const g = svg.append('g').attr('transform', `translate(${margin.l},${margin.t})`);

  const x = d3.scalePoint()
    .domain(career.map(r => fmtSeason(r.season)))
    .range([0, iw])
    .padding(0.3);

  const maxPts = d3.max(career, r => num(r.points));
  const maxG = d3.max(career, r => num(r.goals));
  const maxA = d3.max(career, r => num(r.assists));
  const yMax = Math.max(maxPts, 1);

  const y = d3.scaleLinear().domain([0, yMax * 1.1]).range([ih, 0]);

  // Grid
  g.append('g').attr('class','grid')
    .call(d3.axisLeft(y).ticks(4).tickSize(-iw).tickFormat(''))
    .call(g2 => g2.select('.domain').remove());

  // Axes
  g.append('g').attr('class','axis')
    .attr('transform',`translate(0,${ih})`)
    .call(d3.axisBottom(x).tickSize(3))
    .call(g2 => g2.select('.domain').remove());

  g.append('g').attr('class','axis')
    .call(d3.axisLeft(y).ticks(4))
    .call(g2 => g2.select('.domain').remove());

  // Pre-compute assists for each career season row
  career.forEach(r => { r._assists = num(r.primary_assists) + num(r.secondary_assists); });

  const lines = [
    { key:'points',   color:'#4ade80', label:'PTS' },
    { key:'goals',    color:'#f87171', label:'G' },
    { key:'_assists', color:'#60a5fa', label:'A' },
  ];

  lines.forEach(({ key, color, label }) => {
    const line = d3.line()
      .x(r => x(fmtSeason(r.season)))
      .y(r => y(num(r[key])))
      .curve(d3.curveMonotoneX);

    g.append('path')
      .datum(career)
      .attr('class','trend-line')
      .attr('stroke', color)
      .attr('d', line);

    // Dots
    g.selectAll(`.dot-${key}`)
      .data(career)
      .join('circle')
      .attr('class',`trend-dot dot-${key}`)
      .attr('cx', r => x(fmtSeason(r.season)))
      .attr('cy', r => y(num(r[key])))
      .attr('r', 4)
      .attr('fill', color)
      .attr('stroke', 'var(--bg)')
      .attr('stroke-width', 1.5);
  });

  // Legend
  const legG = g.append('g').attr('transform', `translate(${iw - 80}, 0)`);
  lines.forEach(({ color, label }, i) => {
    legG.append('circle').attr('cx',6).attr('cy', i*16).attr('r',4).attr('fill',color);
    legG.append('text').attr('x',14).attr('y', i*16+4)
      .attr('fill','var(--text-sec)').attr('font-size',9)
      .attr('font-family','var(--sans)').text(label);
  });
}

/* ════════════════════════════════════════════════
   TEAMS TABLE
════════════════════════════════════════════════ */
function renderTeams() {
  const season = document.getElementById('t-season').value;
  let rows = teamStats;
  if (season) rows = rows.filter(r => String(r.season) === String(season));
  rows = sortRows(rows, tSort.col, tSort.dir);

  document.getElementById('t-count').textContent = `${rows.length} teams`;

  const tbody = document.getElementById('teams-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="13" class="empty-state">No data.</td></tr>`;
    return;
  }

  const gfMax = Math.max(...rows.map(r => num(r.team_goals)));
  const wMax  = Math.max(...rows.map(r => num(r.team_wins)));

  tbody.innerHTML = rows.map(r => {
    const gfClass = num(r.team_goals) >= gfMax * 0.9 ? 'stat-hi' : '';
    const wClass  = num(r.team_wins)  >= wMax  * 0.9 ? 'stat-hi' : '';
    const badge   = r.team === 'TOR'
      ? `<span class="team-badge tor">${r.team}</span>`
      : `<span class="team-badge">${r.team}</span>`;
    return `<tr>
      <td class="name-cell">${badge} ${r.team}</td>
      <td>${fmtSeason(r.season)}</td>
      <td>${fmtNum(r.games_played)}</td>
      <td class="${gfClass}">${fmtNum(r.team_goals)}</td>
      <td>${fmtNum(r.team_goals_against)}</td>
      <td class="${wClass}">${fmtNum(r.team_wins)}</td>
      <td>${fmtNum(r.team_losses)}</td>
      <td>${fmtNum(r.team_otlosses)}</td>
      <td>${fmtNum(r.team_points)}</td>
      <td>${fmtNum(r.team_shots)}</td>
      <td>${fmtNum(r.team_shots_against)}</td>
      <td>${fmtNum(r.team_cf_pct, 1)}</td>
      <td>${fmtNum(r.team_xg_pct, 1)}</td>
    </tr>`;
  }).join('');

  updateSortHeaders('teams-table', tSort);
}

document.getElementById('t-season').addEventListener('change', renderTeams);

document.querySelectorAll('#teams-table thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (tSort.col === col) {
      tSort.dir = tSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      tSort.col = col;
      tSort.dir = col === 'team' ? 'asc' : 'desc';
    }
    renderTeams();
  });
});

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
loadAll();
</script>
</body>
</html>
